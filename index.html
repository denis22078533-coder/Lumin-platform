<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Магазин Продуктов</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@3.2.4/dist/tailwind.min.css" rel="stylesheet">
    <style>
        .hero {
            object-fit: cover;
            height: 400px;
        }
        .product-img {
            object-fit: cover;
            width: 100%;
            height: 200px;
        }
    </style>
</head>
<body class="bg-white text-gray-900">

<!-- Header -->
<header class="bg-green-600 text-white p-6">
    <h1 class="text-4xl font-bold text-center">Магазин Продуктов</h1>
</header>

<!-- Hero Section -->
<section>
    <img src="https://cdn.poehali.dev/projects/4fe9d363-5216-44d6-8799-40a6f4aeed69/bucket/lumen-images/434794c5-9ee0-4c21-826c-e194e3e91a47.jpg" alt="Главный баннер" class="hero w-full">
</section>

<!-- Main Content -->
<main class="container mx-auto px-4 py-8">
    <section class="bg-white shadow-lg rounded-lg p-6 mb-6">
        <h2 class="text-2xl font-semibold mb-4">Наши Продукты</h2>
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
            <div class="bg-gray-100 rounded-lg overflow-hidden shadow">
                <img src="https://cdn.poehali.dev/projects/4fe9d363-5216-44d6-8799-40a6f4aeed69/bucket/lumen-images/e44e3e48-0c51-49d7-8120-8ddd7006982b.jpg" alt="Продукт 1" class="product-img">
                <div class="p-4">
                    <h3 class="text-lg font-semibold">Продукт 1</h3>
                    <p class="text-gray-700">Описание продукта 1.</p>
                </div>
            </div>
            <div class="bg-gray-100 rounded-lg overflow-hidden shadow">
                <img src="https://cdn.poehali.dev/projects/4fe9d363-5216-44d6-8799-40a6f4aeed69/bucket/lumen-images/f938785c-0753-4ded-8533-65614a7fdd7f.jpg" alt="Продукт 2" class="product-img">
                <div class="p-4">
                    <h3 class="text-lg font-semibold">Продукт 2</h3>
                    <p class="text-gray-700">Описание продукта 2.</p>
                </div>
            </div>
            <div class="bg-gray-100 rounded-lg overflow-hidden shadow">
                <img src="https://cdn.poehali.dev/projects/4fe9d363-5216-44d6-8799-40a6f4aeed69/bucket/lumen-images/e44e3e48-0c51-49d7-8120-8ddd7006982b.jpg" alt="Продукт 3" class="product-img">
                <div class="p-4">
                    <h3 class="text-lg font-semibold">Продукт 3</h3>
                    <p class="text-gray-700">Описание продукта 3.</p>
                </div>
            </div>
        </div>
    </section>
</main>

<!-- Footer -->
<footer class="bg-green-600 text-white text-center p-4">
    <p>© 2023 Магазин Продуктов. Все права защищены.</p>
</footer>

</body>
</html>
