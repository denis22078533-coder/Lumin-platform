<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ромашка - Продуктовый магазин</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .fade-in {
            opacity: 0;
            transition: opacity 0.5s ease-in-out;
        }
    </style>
</head>
<body class="bg-white">
    <nav class="sticky top-0 bg-white backdrop-blur-lg shadow-lg p-4 flex justify-between items-center">
        <h1 class="text-2xl font-bold">Ромашка</h1>
        <div>
            <a href="#" class="text-blue-600 px-4">Главная</a>
            <a href="#" class="text-blue-600 px-4">Контакты</a>
            <button class="bg-blue-600 text-white px-4 py-2 rounded">В корзину (0)</button>
        </div>
    </nav>

    <header class="h-screen flex justify-center items-center bg-gradient-to-r from-green-400 to-blue-500 text-white text-center">
        <h2 class="text-5xl font-bold">Добро пожаловать в Ромашку!</h2>
        <p class="mt-4 text-xl">Ваш лучший выбор для покупок.</p>
    </header>

    <section class="p-8">
        <h3 class="text-3xl font-semibold mb-6">Наши продукты</h3>
        <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6">
            <div class="border rounded-lg overflow-hidden shadow-lg">
                <img src="https://image.pollinations.ai/prompt/professional%20product%20photo%20%D0%BF%D0%BE%D0%BA%D1%83%D0%BF%D0%B0%D1%82%D1%8C%20%D1%82%D0%BE%D0%B2%D0%B0%D1%80%20%D1%87%D1%82%D0%BE%D0%B1%20%D0%BA%D0%BE%D1%80%D0%B7%D0%B8%D0%BD%D0%B0%20%D0%B1%D1%8B%D0%BB%D0%B0%20%D1%80%D0%B0%D0%B1%D0%BE%D1%87%D0%B0%D1%8F%2C%20isolated%20on%20white%20background%2C%20sharp%20focus%2C%20studio%20lighting%2C%20e-commerce%20style%2C%20high%20quality%2C%20real%20photo?width=800&height=800&seed=43536&nologo=true&model=flux" style="object-fit: cover; width: 100%; height: 200px;">
                <div class="p-4">
                    <h4 class="text-xl font-bold">Покупать товар чтоб корзина была рабочая</h4>
                    <p class="text-gray-600">Артикул: не указан</p>
                    <button class="bg-green-500 text-white px-4 py-2 mt-2 rounded">В корзину</button>
                </div>
            </div>
        </div>
    </section>

    <footer class="bg-gray-800 text-white p-4 text-center">
        <p>© 2023 Ромашка. Все права защищены.</p>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const fadeElements = document.querySelectorAll('.fade-in');
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.style.opacity = '1';
                    }
                });
            });
            fadeElements.forEach(el => observer.observe(el));
        });
    </script>
</body>
</html>
