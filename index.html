<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Магазин свежих продуктов</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            font-family: 'Roboto', sans-serif;
            background-color: #fdfdfd;
            color: #333;
        }
        header {
            text-align: center;
            padding: 20px;
            background-color: #ffcc00;
        }
        header h1 {
            margin: 0;
            font-size: 2rem;
            color: #333;
            font-weight: 700;
        }
        .banner {
            width: 100%;
            height: 400px;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        .banner img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .product-section {
            max-width: 1200px;
            margin: 20px auto;
            padding: 0 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
        }
        .product-card {
            flex: 1 1 calc(25% - 20px);
            max-width: calc(25% - 20px);
            background: #ffffff;
            border: 1px solid #ddd;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }
        .product-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }
        .product-card .details {
            padding: 15px;
            text-align: center;
        }
        .product-card .details h2 {
            font-size: 1.2rem;
            margin: 10px 0;
            color: #444;
        }
        .product-card .details .price {
            color: #ff5555;
            font-size: 1rem;
            font-weight: 500;
        }
        .product-card .details .buttons {
            margin-top: 10px;
            display: flex;
            justify-content: space-around;
            align-items: center;
        }
        .product-card .details button {
            padding: 8px 15px;
            font-size: 0.9rem;
            color: white;
            background-color: #4caf50;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        .product-card .details button:hover {
            background-color: #45a049;
        }
        .cart-section {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #ffcc00;
            padding: 15px 20px;
            border-radius: 50px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.2);
            color: #333;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <header>
        <h1>Магазин свежих продуктов</h1>
    </header>
    <div class="banner">
        <img src="https://cdn.poehali.dev/projects/4fe9d363-5216-44d6-8799-40a6f4aeed69/bucket/lumen-images/6fdf08ec-2a49-4711-9276-4dcb7593ce3f.jpg" alt="Главный баннер">

</body>
</html>
