<!DOCTYPE html>
<html lang="en">
<head>
    <base href="https://denis22078533-coder.github.io/lumin-platform/">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
    <title>Магазин</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">
    
    <!-- Block of Discounts -->
    <div class="bg-yellow-400 text-black text-center p-3 font-bold">
        Скидки до 50% на все товары сегодня!
    </div>

    <!-- Navigation -->
    <header class="bg-blue-600 text-white p-4 flex justify-between items-center">
        <h1 class="text-lg font-bold">Лумин Магазин</h1>
        <div>
            <button class="bg-white text-blue-600 px-4 py-2 rounded">Корзина</button>
        </div>
    </header>

    <!-- Product Grid -->
    <main class="p-6">
        <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
            <!-- Product Card -->
            <div class="bg-white rounded-lg shadow p-4">
                <img src="/images/apples.jpg" alt="Яблоки" class="w-full h-32 object-cover rounded-t">
                <div class="mt-2">
                    <h2 class="text-lg font-bold">Яблоки</h2>
                    <p class="text-gray-600">Цена: 100 руб./кг</p>
                </div>
            </div>

            <!-- Product Card -->
            <div class="bg-white rounded-lg shadow p-4">
                <img src="/images/bread.jpg" alt="Хлеб" class="w-full h-32 object-cover rounded-t">
                <div class="mt-2">
                    <h2 class="text-lg font-bold">Хлеб</h2>
                    <p class="text-gray-600">Цена: 50 руб./шт</p>
                </div>
            </div>

            <!-- Product Card -->
            <div class="bg-white rounded-lg shadow p-4">
                <img src="/images/milk.jpg" alt="Молоко" class="w-full h-32 object-cover rounded-t">
                <div class="mt-2">
                    <h2 class="text-lg font-bold">Молоко</h2>
                    <p class="text-gray-600">Цена: 80 руб./л</p>
                </div>
            </div>

            <!-- Product Card -->
            <div class="bg-white rounded-lg shadow p-4">
                <img src="/images/bananas.jpg" alt="Бананы" class="w-full h-32 object-cover rounded-t">
                <div class="mt-2">
                    <h2 class="text-lg font-bold">Бананы</h2>
                    <p class="text-gray-600">Цена: 120 руб./кг</p>
                </div>
            </div>
        </div>
    </main>

</body>
</html>
