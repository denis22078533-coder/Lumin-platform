<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Картинки Природы</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@3.2.4/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gray-50 text-gray-900">

<!-- Header -->
<header class="bg-green-600 text-white p-6">
    <h1 class="text-4xl font-bold text-center">Картинки Природы</h1>
    <p class="text-lg text-center">Наслаждайтесь красотой природы</p>
</header>

<!-- Main Content -->
<main class="container mx-auto px-4 py-8">
    <section class="bg-white shadow-md rounded-lg p-6 mb-6">
        <h2 class="text-2xl font-semibold mb-4">Природа на ваших экранах</h2>
        <div class="grid grid-cols-2 gap-4">
            <img src="https://via.placeholder.com/600x400.png?text=Природа+1" alt="Природа 1" class="rounded-md shadow-md">
            <img src="https://via.placeholder.com/600x400.png?text=Природа+2" alt="Природа 2" class="rounded-md shadow-md">
            <img src="https://via.placeholder.com/600x400.png?text=Природа+3" alt="Природа 3" class="rounded-md shadow-md">
            <img src="https://via.placeholder.com/600x400.png?text=Природа+4" alt="Природа 4" class="rounded-md shadow-md">
        </div>
    </section>
</main>

<!-- Footer -->
<footer class="bg-gray-800 text-white text-center p-4">
    <p>© 2023 Картинки Природы. Все права защищены.</p>
</footer>

</body>
</html>
