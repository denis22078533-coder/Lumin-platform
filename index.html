<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Lumin Store</title>
    <base href="/Lumin-platform/">
    <script src="https://cdn.jsdelivr.net/npm/tailwindcss@3.2.4"></script>
</head>
<body class="bg-gray-100 text-gray-900">

<!-- Top Banner -->
<div class="bg-yellow-500 text-center py-4 text-lg font-bold">
    Скидка 20% только сегодня!
</div>

<!-- Header -->
<header class="bg-blue-900 text-white">
    <div class="container mx-auto px-4 py-6 flex justify-between items-center">
        <div class="text-2xl font-bold">Lumin Store</div>
        <div id="cart-count" class="text-lg">
            Корзина: <span id="cart-number">0</span>
        </div>
    </div>
</header>

<!-- Main Section -->
<main class="container mx-auto px-4 py-8">
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
        <!-- Card 1 -->
        <div class="bg-white p-6 shadow-md rounded-lg">
            <h3 class="text-xl font-semibold mb-2">Яблоки</h3>
            <p class="text-gray-700 mb-4">Свежие красные яблоки</p>
            <button class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700" onclick="addToCart()">В корзину</button>
        </div>
        <!-- Card 2 -->
        <div class="bg-white p-6 shadow-md rounded-lg">
            <h3 class="text-xl font-semibold mb-2">Хлеб</h3>
            <p class="text-gray-700 mb-4">Мягкий и вкусный</p>
            <button class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700" onclick="addToCart()">В корзину</button>
        </div>
        <!-- Card 3 -->
        <div class="bg-white p-6 shadow-md rounded-lg">
            <h3 class="text-xl font-semibold mb-2">Молоко</h3>
            <p class="text-gray-700 mb-4">Свежайшее молоко</p>
            <button class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700" onclick="addToCart()">В корзину</button>
        </div>
        <!-- Card 4 -->
        <div class="bg-white p-6 shadow-md rounded-lg">
            <h3 class="text-xl font-semibold mb-2">Сыр</h3>
            <p class="text-gray-700 mb-4">Натуральный сыр</p>
            <button class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700" onclick="addToCart()">В корзину</button>
        </div>
    </div>
</main>

<!-- Notification -->
<div id="notification" class="hidden fixed top-10 right-5 bg-green-500 text-white px-6 py-4 rounded-lg shadow-lg">
    Товар добавлен!
</div>

<script>
    let cartNumber = 0;

    function addToCart() {
        cartNumber++;
        document.getElementById('cart-number').textContent = cartNumber;

        // Show the notification
        const notification = document.getElementById('notification');
        notification.classList.remove('hidden');

        // Hide the notification after 2 seconds
        setTimeout(() => {
            notification.classList.add('hidden');
        }, 2000);
    }
</script>

</body>
</html>
