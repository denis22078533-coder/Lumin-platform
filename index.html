<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <base href="/Lumin-platform/">
    <script src="https://tailwindcss.com"></script>
    <title>Продуктовый магазин</title>
</head>
<body class="bg-gray-100">
    <div class="bg-yellow-400 text-center py-2 font-bold shadow-sm">
        Скидка 20% на все товары! Только сегодня!
    </div>
    <header class="bg-blue-600 text-white p-4 shadow-lg flex justify-between items-center px-8">
        <h1 class="text-2xl font-bold">Lumin Store</h1>
        <div class="font-semibold">Корзина: <span id="cart-count">0</span> товаров</div>
    </header>
    <main class="p-8 max-w-5xl mx-auto grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
        <!-- Карточка Яблоки -->
        <div class="bg-white p-6 rounded-2xl shadow-md text-center">
            <h2 class="text-xl font-bold mb-4">Яблоки</h2>
            <button onclick="addToCart()" class="bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700 transition w-full">Добавить в корзину</button>
        </div>
        <!-- Карточка Хлеб -->
        <div class="bg-white p-6 rounded-2xl shadow-md text-center">
            <h2 class="text-xl font-bold mb-4">Хлеб</h2>
            <button onclick="addToCart()" class="bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700 transition w-full">Добавить в корзину</button>
        </div>
        <!-- Карточка Молоко -->
        <div class="bg-white p-6 rounded-2xl shadow-md text-center">
            <h2 class="text-xl font-bold mb-4">Молоко</h2>
            <button onclick="addToCart()" class="bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700 transition w-full">Добавить в корзину</button>
        </div>
        <!-- Карточка Сыр -->
        <div class="bg-white p-6 rounded-2xl shadow-md text-center">
            <h2 class="text-xl font-bold mb-4">Сыр</h2>
            <button onclick="addToCart()" class="bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700 transition w-full">Добавить в корзину</button>
        </div>
    </main>
    <script>
        let count = 0;
        function addToCart() {
            count++;
            document.getElementById('cart-count').innerText = count;
            alert('Ура! Товар добавлен в корзину!');
        }
    </script>
</body>
</html>
